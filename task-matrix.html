const VIEWS={brief:viewBrief,add:viewAdd,backlog:viewBacklog,projects:viewProjects,log:viewLog};

function navigate(v) {
  if(v!=='backlog') bSearch='';
  if(v!=='projects') projDetailId=null;
  curView=v;
  try{localStorage.setItem('tm_curView',v);}catch(e){}
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.nav===v));
  rv();
  document.getElementById('app').scrollTop=0;
}

function applyBacklogSearch(q) {
  const term=q.toLowerCase().trim();
  document.querySelectorAll('.task-card').forEach(card=>{
    card.style.display=(!term||card.dataset.title.includes(term))?'':'none';
  });
  // hide task-grid containers where all cards are hidden
  document.querySelectorAll('.task-grid').forEach(grid=>{
    const hasVis=[...grid.querySelectorAll('.task-card')].some(c=>c.style.display!=='none');
    grid.style.display=hasVis?'':'none';
  });
  // hide category headers whose grid is fully hidden
  document.querySelectorAll('.cat-hd').forEach(hd=>{
    const grid=hd.nextElementSibling;
    hd.style.display=(grid&&grid.classList.contains('task-grid')&&grid.style.display!=='none')?'':'none';
  });
}

function rv() {
  document.getElementById('app').innerHTML=`<div class="view">${(VIEWS[curView]||viewBrief)()}</div>`;
  if (curView==='add') {
    if (addTab==='task') {
      const ti=document.getElementById('f-title');
      if(ti){ ti.value=AF.title; ti.addEventListener('input',e=>AF.title=e.target.value); }
    }
  }
  if (curView==='backlog') {
    const si=document.getElementById('b-search');
    const cb=document.getElementById('b-search-clear');
    if(si) {
      if(bSearch){ applyBacklogSearch(bSearch); si.focus(); si.setSelectionRange(bSearch.length,bSearch.length); }
      si.addEventListener('input', e=>{
        bSearch=e.target.value;
        if(cb) cb.style.display=bSearch?'':'none';
        applyBacklogSearch(bSearch);
      });
    }
    if(cb) cb.addEventListener('click', ()=>{bSearch=''; rv();});
  }
}

document.addEventListener('click', e=>{
  const btn=e.target.closest('[data-a]'); if(!btn) return;
  if(Date.now() < _blockActionsUntil) return; // block ghost-clicks after modal close
  const a=btn.dataset.a, id=btn.dataset.id;

  switch(a) {
    case 'log-med':  toggleMed(btn.dataset.med); break;
    case 'skip-med': skipMed(btn.dataset.med); break;
    case 'med-settings': openMedSettings(); break;

    case 'complete':
      btn.classList.add('anim-pop');
      setTimeout(()=>completeTask(id),180); break;

    case 'complete-chunk': completeChunk(btn.dataset.tid, btn.dataset.cid); break;

    case 'add-plate':  addToPlate(id); break;
    case 'rm-plate':   removeFromPlate(id); break;
    case 'clear-plate': plate.ids=[];save();rv(); break;

    case 'set-time':
      ctx.time=btn.dataset.v; ctx.date=todayStr(); save();
      document.querySelectorAll('[data-a="set-time"]').forEach(b=>b.classList.toggle('sel',b.dataset.v===ctx.time));
      if(ctx.time&&ctx.energy) rv(); break;

    case 'set-energy':
      ctx.energy=btn.dataset.v; ctx.date=todayStr(); save();
      document.querySelectorAll('[data-a="set-energy"]').forEach(b=>b.classList.toggle('sel',b.dataset.v===ctx.energy));
      if(ctx.time&&ctx.energy) rv(); break;

    case 'reset-ctx': ctx.time=null;ctx.energy=null;save();rv(); break;

    case 'set-ftime':
      syncAF(); AF.time=btn.dataset.v;
      document.querySelectorAll('[data-a="set-ftime"]').forEach(b=>b.classList.toggle('sel',b.dataset.v===AF.time));
      // Re-render only if chunk hint visibility changes
      { const was=AF.showChunks||AF.chunks.length>0; if(!was) rv(); } break;

    case 'set-feffort':
      syncAF(); AF.effort=btn.dataset.v;
      document.querySelectorAll('[data-a="set-feffort"]').forEach(b=>b.classList.toggle('sel',b.dataset.v===AF.effort));
      { const was=AF.showChunks||AF.chunks.length>0; if(!was) rv(); } break;

    case 'toggle-recurring':
      syncAF(); AF.recurring=!AF.recurring;
      rv(); break;

    case 'set-recur-type':
      syncAF(); AF.recurType=btn.dataset.v; rv(); break;

    case 'add-chunk':
      syncAF(); AF.chunks.push({id:newId(),title:'',completedAt:null}); AF.showChunks=true; rv();
      // Focus the new input
      setTimeout(()=>{const ins=document.querySelectorAll('.chunk-inp');if(ins.length)ins[ins.length-1].focus();},50);
      break;

    case 'rm-chunk':
      syncAF(); AF.chunks=AF.chunks.filter(c=>c.id!==btn.dataset.cid); rv(); break;

    case 'set-add-tab':
      syncAF(); addTab=btn.dataset.v; rv(); break;

    case 'submit-project':
      doCreateProjectFromAdd(); break;

    case 'submit-task': {
      if(btn.disabled) break; // prevent double-tap
      syncAF();
      const title=AF.title.trim();
      if(!title){document.getElementById('f-title')?.focus();showToast('Please enter a title');return;}
      // Lock button immediately so second tap does nothing
      btn.disabled=true; btn.textContent='Added ✓';
      btn.style.background='#4a9e6a';
      const catEl=document.getElementById('f-cat');
      const cat=catEl?catEl.value:AF.category;
      let recurrence=null;
      if(AF.recurring){
        if(AF.recurType==='interval'){
          recurrence={type:'interval',every:parseInt(AF.recurEvery)||1,unit:AF.recurUnit};
        } else {
          recurrence={type:'weekday',week:AF.recurWeek,weekday:AF.recurWeekday,monthInterval:parseInt(AF.recurMonthInterval)||1};
        }
      }
      const chunks=AF.chunks.filter(c=>c.title.trim()).map(c=>({id:c.id,title:c.title.trim(),completedAt:null,dueDate:c.dueDate||undefined}));
      const stepDates=chunks.map(c=>c.dueDate).filter(Boolean).sort();
      const deadline=AF.deadline||(stepDates.length?stepDates[stepDates.length-1]:null);
      addTask({title,category:cat,time:AF.time,effort:AF.effort,
               deadline,
               recurrence,chunks:chunks.length?chunks:null});
      AF={title:'',category:cat,time:'medium',effort:'medium',
          deadline:'',recurring:false,recurType:'interval',
          recurEvery:'1',recurUnit:'days',recurWeek:'1',recurWeekday:'1',recurMonthInterval:'1',
          chunks:[],showChunks:false};
      setTimeout(()=>navigate('backlog'), 350); break;
    }

    case 'fcat': bFilter=btn.dataset.cat; rv(); break;
    case 'set-sort': bSort=btn.dataset.v; rv(); break;

    case 'confirm-recur': doCompleteRecur(id, btn.dataset.next); break;
    case 'close-recur-modal': closeCompleteRecurModal(); break;
    case 'skip-recur':      skipRecurring(id); break;
    case 'skip-recur-edit': closeEditModal(); skipRecurring(id); break;
    case 'snooze':          snoozeTask(id, btn.dataset.snooze); break;
    case 'toggle-chunks':
      if(expandedChunks.has(id)) expandedChunks.delete(id); else expandedChunks.add(id);
      rv(); break;

    case 'open-log-edit': openLogEditSheet(btn.dataset.type, id); break;
    case 'close-log-edit': closeLogEditModal(); break;
    case 'save-log-edit': {
      const ltype=btn.dataset.type;
      const dateVal=document.getElementById('le-date')?.value;
      const timeVal=document.getElementById('le-time')?.value;
      if(!dateVal||!timeVal){showToast('Date and time required');return;}
      const newTs=`${dateVal}T${timeVal}:00`;
      if(ltype==='task') {
        const t=tasks.find(x=>x.id===id);
        if(t) {
          t.completedAt=newTs;
          const cv=document.getElementById('le-cat')?.value;
          if(cv) t.category=cv;
        }
      } else if(ltype==='recur') {
        const r=recurLog.find(x=>x.id===id);
        if(r) {
          r.completedAt=newTs;
          const tv=(document.getElementById('le-title')?.value||'').trim();
          if(tv) r.title=tv;
          const cv=document.getElementById('le-cat')?.value;
          if(cv) r.cat=cv;
        }
      } else {
        const m=medLogs.find(x=>x.id===id); if(m) m.takenAt=newTs;
      }
      save(); closeLogEditModal(); showToast('Updated ✓'); rv(); break;
    }
    case 'delete-log-entry': {
      const ltype=btn.dataset.type;
      const msg=ltype==='task'?'Restore task to active (unmark complete)?':'Delete this log entry?';
      if(!confirm(msg)) break;
      if(ltype==='task') {
        const t=tasks.find(x=>x.id===id); if(t) { delete t.completedAt; delete t.completedChunks; }
      } else if(ltype==='recur') {
        recurLog=recurLog.filter(x=>x.id!==id);
      } else {
        medLogs=medLogs.filter(x=>x.id!==id);
      }
      save(); closeLogEditModal(); rv(); break;
    }

    case 'delete-chunk-log': {
      if(!confirm('Remove this step from the log? (It will be unchecked on the task.)')) break;
      const entry=recurLog.find(x=>x.id===id);
      if(entry) {
        const t=tasks.find(x=>x.id===btn.dataset.tid);
        if(t&&t.chunks) { const ch=t.chunks.find(c=>c.id===btn.dataset.cid); if(ch) ch.completedAt=null; }
        recurLog=recurLog.filter(x=>x.id!==id);
      }
      save(); rv(); break;
    }

    case 'open-project':      projDetailId=btn.dataset.pid; rv(); break;
    case 'back-to-projects':  projDetailId=null; rv(); break;

    case 'new-project':      openNewProjectModal(); break;
    case 'close-proj-modal': closeProjectModal(); break;
    case 'do-create-project': doCreateProject(); break;

    case 'add-phase':       openNewPhaseModal(btn.dataset.pid); break;
    case 'close-phase-modal': closePhaseModal(); break;
    case 'do-create-phase': doCreatePhase(btn.dataset.pid); break;

    case 'add-proj-task':    openAddProjectTaskModal(btn.dataset.pid, btn.dataset.phid); break;
    case 'close-ptask-modal': closeProjTaskModal(); break;

    case 'delete-project': {
      const proj=projects.find(p=>p.id===btn.dataset.pid);
      if(!proj) break;
      if(!confirm(`Delete project "${proj.title}"? Tasks will remain in the backlog (without project label).`)) break;
      tasks.forEach(t=>{ if(t.projectId===btn.dataset.pid){delete t.projectId;delete t.phaseId;} });
      projects=projects.filter(p=>p.id!==btn.dataset.pid);
      save(); rv(); break;
    }

    case 'delete-phase': {
      const proj=projects.find(p=>p.id===btn.dataset.pid); if(!proj) break;
      const phase=(proj.phases||[]).find(ph=>ph.id===btn.dataset.phid);
      if(!phase) break;
      if(!confirm(`Delete phase "${phase.title}"? Tasks in this phase will remain (as unphased).`)) break;
      tasks.forEach(t=>{ if(t.phaseId===btn.dataset.phid) delete t.phaseId; });
      proj.phases=proj.phases.filter(ph=>ph.id!==btn.dataset.phid);
      save(); rv(); break;
    }

    case 'open-edit': openEditSheet(id); break;
    case 'close-edit': closeEditModal(); break;
    case 'save-edit': {
      const t=tasks.find(x=>x.id===id); if(!t){closeEditModal();break;}
      const title=(document.getElementById('et-title')?.value||'').trim();
      if(!title){showToast('Title required');return;}
      t.title=title;
      t.description=(document.getElementById('et-desc')?.value||'').trim()||undefined;
      t.link=(document.getElementById('et-link')?.value||'').trim()||undefined;
      t.category=document.getElementById('et-cat')?.value||t.category;
      const dateInp=document.getElementById('et-date');
      if(dateInp!==null&&dateInp!==undefined){
        if(t.recurrence) t.nextDue=dateInp.value||t.nextDue;
        else t.deadline=dateInp.value||null;
      }
      t.time=document.querySelector('#edit-modal [data-et="time"].sel')?.dataset.v||t.time;
      t.effort=document.querySelector('#edit-modal [data-et="effort"].sel')?.dataset.v||t.effort;
      if(t.time==='low') {
        t.chunks=null;
      } else {
        syncEditChunkTitles();
        const saved=editChunks.filter(c=>c.title.trim());
        t.chunks=saved.length?saved.map(c=>({id:c.id||newId(),title:c.title.trim(),completedAt:c.completedAt||null,dueDate:c.dueDate||undefined})):null;
        if(!t.recurrence && t.chunks) {
          const stepDates=t.chunks.map(c=>c.dueDate).filter(Boolean).sort();
          if(stepDates.length && !dateInp?.value) t.deadline=stepDates[stepDates.length-1];
        }
      }
      save(); closeEditModal(); showToast('Saved ✓'); rv(); break;
    }
    case 'delete-task': {
      if(!confirm('Delete this task?')) break;
      tasks=tasks.filter(x=>x.id!==id);
      plate.ids=plate.ids.filter(x=>x!==id);
      save(); closeEditModal(); rv(); break;
    }
  }
});
